<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=4" />
    <link rel="apple-touch-icon" href="/icone.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- GitHub Pages SPA: restaure l'URL encodée par 404.html -->
    <script>
      (function (l) {
        if (l.search[1] === 'p') {
          var parts = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            parts[0].slice(2) +
            (parts[1] ? '?' + parts[1] : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
    <meta name="description" content="Hoplalo'K | Location de matériel festif pour vos événements : chapiteaux, mobilier, éclairage, sono et bien plus." />
    <meta name="theme-color" content="#FFE66D" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Hoplalo'K | Location de matériel festif" />
    <meta property="og:description" content="Hoplalo'K | Location de matériel festif pour vos événements : chapiteaux, mobilier, éclairage, sono et bien plus." />

    <!-- Google Fonts: Bangers + Nunito -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />

    <title>Hoplalo'K | Location de matériel festif</title>

  </body>
</html>
