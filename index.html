    <!-- GitHub Pages SPA: restaure l'URL encodée par 404.html -->
    <script>
      (function (l) {
        if (l.search[1] === 'p') {
          var parts = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            parts[0].slice(2) +
            (parts[1] ? '?' + parts[1].slice(2) : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
